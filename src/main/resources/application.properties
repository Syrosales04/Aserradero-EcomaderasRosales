# ===========================================================
#  Configuracion de la aplicacion - Aserradero Rendimiento
# ===========================================================

spring.application.name=aserradero-rendimiento
server.port=9000

# ---- Conexion a la base de datos MySQL ----
# Cambia usuario y contrasena segun tu instalacion de MySQL.
# createDatabaseIfNotExist=true crea la base automaticamente si no existe.
spring.datasource.url=jdbc:mysql://localhost:3306/aserradero_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Costa_Rica&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=#081104Sr!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
# update: crea/actualiza las tablas a partir de las entidades sin borrar datos.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- Codificacion ----
spring.mvc.format.date=yyyy-MM-dd

# ---- Mensajes de error mas claros en la API ----
server.error.include-message=always
server.error.include-binding-errors=always
