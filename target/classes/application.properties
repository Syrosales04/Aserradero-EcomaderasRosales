    # ===========================================================
#  Configuracion de la aplicacion - Aserradero Rendimiento
# ===========================================================

spring.application.name=aserradero-rendimiento
server.port=${PORT:8080}
# ---- Conexion a la base de datos MySQL ----
# Cambia usuario y contrasena segun tu instalacion de MySQL.
# createDatabaseIfNotExist=true crea la base automaticamente si no existe.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
# update: crea/actualiza las tablas a partir de las entidades sin borrar datos.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- Codificacion ----
spring.mvc.format.date=yyyy-MM-dd

# ---- Mensajes de error mas claros en la API ----
server.error.include-message=always
server.error.include-binding-errors=always
